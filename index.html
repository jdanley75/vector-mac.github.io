<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas - Trip Dashboards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 440px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #ff6b1a;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .trip-card {
            background: #14141f;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #ff6b1a;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .trip-card:hover {
            background: #1a1a2e;
        }
        .trip-destination {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .trip-dates {
            font-size: 14px;
            color: #888;
        }
        .trip-status {
            font-size: 12px;
            color: #ff6b1a;
            margin-top: 8px;
        }
        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Atlas</h1>
    <div class="subtitle">Your travel concierge</div>
    
    <a href="trips/frankfurt-may-2026/index.html" class="trip-card">
        <div class="trip-destination">Frankfurt</div>
        <div class="trip-dates">May 20-25, 2026</div>
        <div class="trip-status">⚠️ Hotel not booked</div>
    </a>
    
    <div class="footer">
        Auto-generated by Atlas
    </div>
</body>
</html>
